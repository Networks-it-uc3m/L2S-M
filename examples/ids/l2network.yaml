apiVersion: l2sm.l2sm.k8s.local/v1
kind: L2Network
metadata:
  name: ztna-example-1-portscan
spec:
  type: vnet
  networkCIDR: "10.0.0.0/24"
  podAddressRange: "10.0.0.0/24"
  ids:
    enabled: true
    node: l2sm-test-control-plane
    profile: suricata
    homeNetCidr:
      - "10.0.0.0/24"
    useEmergingThreatsOpen: false
    customRuleSources:
      - name: custom-port-scan-rules
        configMapRef:
          name: suricata-scan-rules
