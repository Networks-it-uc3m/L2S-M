apiVersion: l2sm.l2sm.k8s.local/v1
kind: L2Network
metadata:
  name: quarantine-demo-production
  labels:
    l2sm/example: quarantine
    l2sm/role: production
spec:
  type: vnet
  networkCIDR: "10.20.0.0/24"
  podAddressRange: "10.20.0.0/24"
  ids:
    enabled: true
    node: l2sm-test-control-plane
    profile: suricata
    homeNetCidr:
      - "10.20.0.0/24"
    useEmergingThreatsOpen: false
    customRuleSources:
      - name: production-ids-rules
        configMapRef:
          name: production-ids-rules
---
apiVersion: l2sm.l2sm.k8s.local/v1
kind: L2Network
metadata:
  name: quarantine-demo-isolation
  labels:
    l2sm/example: quarantine
    l2sm/role: quarantine
spec:
  type: vnet
  networkCIDR: "10.20.0.0/24"
  podAddressRange: "10.20.0.0/24"
  ids:
    enabled: true
    node: l2sm-test-control-plane
    profile: suricata
    homeNetCidr:
      - "10.20.0.0/24"
    useEmergingThreatsOpen: false
    customRuleSources:
      - name: quarantine-ids-rules
        configMapRef:
          name: quarantine-ids-rules
